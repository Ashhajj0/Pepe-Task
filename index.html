<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PepeTask</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script>
      // Support for older Telegram versions that don't have CloudStorage
      // This polyfill prevents errors when third-party scripts try to use it
      (function() {
        var storagePolyfill = {
          setItem: function(k, v, cb) { 
            try { localStorage.setItem('tg_cloud_' + k, v); if (cb) cb(null, true); } catch (e) { if (cb) cb(e, false); }
          },
          getItem: function(k, cb) {
            try { var v = localStorage.getItem('tg_cloud_' + k); if (cb) cb(null, v); } catch (e) { if (cb) cb(e, null); }
          },
          getItems: function(ks, cb) {
            try {
              var res = {};
              ks.forEach(function(k) { res[k] = localStorage.getItem('tg_cloud_' + k); });
              if (cb) cb(null, res);
            } catch (e) { if (cb) cb(e, {}); }
          },
          removeItem: function(k, cb) {
            try { localStorage.removeItem('tg_cloud_' + k); if (cb) cb(null, true); } catch (e) { if (cb) cb(e, false); }
          },
          removeItems: function(ks, cb) {
            try { ks.forEach(function(k) { localStorage.removeItem('tg_cloud_' + k); }); if (cb) cb(null, true); } catch (e) { if (cb) cb(e, false); }
          },
          getKeys: function(cb) {
            try {
              var keys = Object.keys(localStorage).filter(function(k) { return k.indexOf('tg_cloud_') === 0; }).map(function(k) { return k.replace('tg_cloud_', ''); });
              if (cb) cb(null, keys);
            } catch (e) { if (cb) cb(e, []); }
          }
        };

        function applyPolyfill() {
          try {
            var tg = window.Telegram;
            if (!tg) {
              window.Telegram = tg = {};
            }
            if (!tg.WebApp) {
              tg.WebApp = {};
            }
            
            // 1. Force version to 6.9+ to satisfy SDK checks for CloudStorage
            try {
              var currentVersion = tg.WebApp.version;
              if (!currentVersion || parseFloat(currentVersion) < 6.9) {
                Object.defineProperty(tg.WebApp, 'version', {
                  value: '6.9',
                  writable: true,
                  configurable: true,
                  enumerable: true
                });
              }
            } catch (vErr) {}

            // 2. Polyfill isVersionAtLeast
            if (!tg.WebApp.isVersionAtLeast) {
              tg.WebApp.isVersionAtLeast = function(v) {
                return true; // We claim to support everything
              };
            }

            // 3. Polyfill CloudStorage
            var descriptor = Object.getOwnPropertyDescriptor(tg.WebApp, 'CloudStorage');
            var isMyPolyfill = descriptor && (descriptor.get && descriptor.get.isMyPolyfill);
            
            if (!isMyPolyfill) {
              var needsPolyfill = false;
              try {
                if (!tg.WebApp.isVersionAtLeast || !tg.WebApp.isVersionAtLeast('6.9')) {
                  needsPolyfill = true;
                } else {
                  // Even if version says okay, double check it doesn't throw or isn't a mock
                  var cs = tg.WebApp.CloudStorage;
                  if (!cs || (cs.setItem && cs.setItem.toString().indexOf('not supported') !== -1)) {
                    needsPolyfill = true;
                  }
                }
              } catch (e) {
                needsPolyfill = true;
              }

              if (needsPolyfill) {
                var getter = function() { return storagePolyfill; };
                getter.isMyPolyfill = true;
                Object.defineProperty(tg.WebApp, 'CloudStorage', {
                  get: getter,
                  set: function(v) { if (v && v !== storagePolyfill) storagePolyfill = v; },
                  configurable: true,
                  enumerable: true
                });
              }
            }
          } catch (e) {}
        }

        // Run immediately to catch it before SDK loads
        applyPolyfill();

        // Run early and often to catch it as soon as possible after SDK loads
        var attempts = 0;
        var interval = setInterval(function() {
          applyPolyfill();
          attempts++;
          if (attempts > 200) clearInterval(interval);
        }, 50);
      })();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://ad.gigapub.tech/script?id=6695"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
