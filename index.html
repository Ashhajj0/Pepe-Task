<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PepeTask</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script>
      // Support for older Telegram versions that don't have CloudStorage
      // This polyfill prevents errors when third-party scripts try to use it
      (function() {
        var storagePolyfill = {
          setItem: function(k, v, cb) { 
            try { localStorage.setItem('tg_cloud_' + k, v); if (cb) cb(null, true); } catch (e) { if (cb) cb(e, false); }
          },
          getItem: function(k, cb) {
            try { var v = localStorage.getItem('tg_cloud_' + k); if (cb) cb(null, v); } catch (e) { if (cb) cb(e, null); }
          },
          getItems: function(ks, cb) {
            try {
              var res = {};
              ks.forEach(function(k) { res[k] = localStorage.getItem('tg_cloud_' + k); });
              if (cb) cb(null, res);
            } catch (e) { if (cb) cb(e, {}); }
          },
          removeItem: function(k, cb) {
            try { localStorage.removeItem('tg_cloud_' + k); if (cb) cb(null, true); } catch (e) { if (cb) cb(e, false); }
          },
          removeItems: function(ks, cb) {
            try { ks.forEach(function(k) { localStorage.removeItem('tg_cloud_' + k); }); if (cb) cb(null, true); } catch (e) { if (cb) cb(e, false); }
          },
          getKeys: function(cb) {
            try {
              var keys = Object.keys(localStorage).filter(function(k) { return k.indexOf('tg_cloud_') === 0; }).map(function(k) { return k.replace('tg_cloud_', ''); });
              if (cb) cb(null, keys);
            } catch (e) { if (cb) cb(e, []); }
          }
        };

        function applyPolyfill() {
          if (window.Telegram && window.Telegram.WebApp) {
            if (!window.Telegram.WebApp.CloudStorage) {
              try {
                window.Telegram.WebApp.CloudStorage = storagePolyfill;
              } catch (e) {
                try {
                  Object.defineProperty(window.Telegram.WebApp, 'CloudStorage', {
                    value: storagePolyfill,
                    writable: true,
                    configurable: true
                  });
                } catch (e2) {}
              }
            }
          }
        }

        // Run early and often to catch it as soon as possible
        var interval = setInterval(function() {
          applyPolyfill();
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.CloudStorage) {
            // We keep it running for a bit longer just in case something overwrites it
            if (attempts++ > 100) clearInterval(interval);
          }
        }, 50);
        var attempts = 0;
      })();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://ad.gigapub.tech/script?id=6695"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
